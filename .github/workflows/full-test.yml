# Full test suite - runs on merge to main
name: Full Test Suite

on:
  push:
    branches: [main, master]

jobs:
  full-test:
    name: Full Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full test suite
        timeout-minutes: 45
        run: |
          pytest tests/ --tb=short -q \
            --ignore=tests/validation/r_triangulation \
            --ignore=tests/validation/cross_language \
            --ignore=tests/validation/adversarial \
            --ignore=tests/validation/monte_carlo/test_monte_carlo_cate.py \
            --ignore=tests/test_cate \
            -m "not slow and not monte_carlo"
