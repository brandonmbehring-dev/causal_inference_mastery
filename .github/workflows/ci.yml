# CI workflow - runs on every PR
# Fast feedback: linting + fast tests only
name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: pip install black ruff mypy types-all numpy pandas-stubs

      - name: Check formatting with Black
        run: black --check --line-length=100 src/ tests/

      - name: Lint with Ruff
        run: ruff check src/ tests/

  fast-test:
    name: Fast Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run fast tests (skip slow/monte_carlo)
        run: pytest tests/ -m "not slow and not monte_carlo" --tb=short -q
