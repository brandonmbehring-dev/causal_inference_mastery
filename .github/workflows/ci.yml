# CI workflow - runs on every PR
# Fast feedback: linting + collection check + fast tests
name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: pip install ruff mypy numpy pandas-stubs

      - name: Check formatting with Ruff
        run: ruff format --check --line-length=100 src/ tests/

      - name: Lint with Ruff
        run: ruff check src/ tests/

  collect:
    name: Test Collection Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify test collection (catch import errors)
        run: |
          # This catches broken imports, syntax errors, and fixture issues
          # before running any tests. Fails fast on collection errors.
          pytest tests/ --collect-only -q 2>&1 | tee collection.log
          if grep -q "error" collection.log; then
            echo "::error::Test collection failed - check for import/syntax errors"
            exit 1
          fi

  fast-test:
    name: Fast Tests
    runs-on: ubuntu-latest
    needs: collect
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run fast tests (skip slow/monte_carlo)
        run: pytest tests/ -m "not slow and not monte_carlo" --tb=short -q
